<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="beraGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#F7931A"/>
      <stop offset="100%" style="stop-color:#FFB347"/>
    </linearGradient>
    <linearGradient id="honeyGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F4A460"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#beraGradient)"/>
  
  <!-- Bear face outline -->
  <ellipse cx="32" cy="35" rx="18" ry="16" fill="#2D1F14"/>
  
  <!-- Bear ears -->
  <circle cx="16" cy="18" r="8" fill="#2D1F14"/>
  <circle cx="48" cy="18" r="8" fill="#2D1F14"/>
  <circle cx="16" cy="18" r="5" fill="#4A3728"/>
  <circle cx="48" cy="18" r="5" fill="#4A3728"/>
  
  <!-- Bear face inner -->
  <ellipse cx="32" cy="36" rx="14" ry="12" fill="#4A3728"/>
  
  <!-- Snout -->
  <ellipse cx="32" cy="42" rx="8" ry="6" fill="url(#honeyGradient)"/>
  
  <!-- Nose -->
  <ellipse cx="32" cy="40" rx="4" ry="3" fill="#2D1F14"/>
  
  <!-- Eyes -->
  <circle cx="24" cy="32" r="4" fill="#FFFFFF"/>
  <circle cx="40" cy="32" r="4" fill="#FFFFFF"/>
  <circle cx="25" cy="31" r="2" fill="#2D1F14"/>
  <circle cx="41" cy="31" r="2" fill="#2D1F14"/>
  <circle cx="25.5" cy="30.5" r="0.8" fill="#FFFFFF"/>
  <circle cx="41.5" cy="30.5" r="0.8" fill="#FFFFFF"/>
  
  <!-- Honey drip accent -->
  <path d="M50 45 Q52 48 50 52 Q48 55 46 52 Q44 48 46 45 Q48 42 50 45" fill="url(#honeyGradient)" opacity="0.8"/>
  
  <!-- Blockchain hexagon accent -->
  <polygon points="32,54 28,56 28,60 32,62 36,60 36,56" fill="#FFFFFF" opacity="0.3"/>
</svg>
